<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h2>Admin Dashboard</h2>

<p><b>Total Users:</b> {{ total_users }}</p>
<p><b>Top Career:</b> {{ top_career }}</p>

<form method="GET" class="mb-3">

    <select name="interest" class="form-control w-50 d-inline">
        <option value="">All</option>
        <option value="coding">Coding</option>
        <option value="biology">Biology</option>
        <option value="business">Business</option>
    </select>

    <button class="btn btn-primary">Filter</button>

</form>

<table border="1" align="center">

<tr>
<th>ID</th>
<th>Name</th>
<th>Interest</th>
<th>Skill</th>
<th>Personality</th>
<th>Marks</th>
<th>Careers</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
<td>{{row[5]}}</td>
<td>{{row[6]}}</td>
</tr>
{% endfor %}

</table>

<h3>Career Interest Analytics</h3>

<canvas id="adminChart" width="400" height="200"></canvas>

<script>

var ctx = document.getElementById('adminChart').getContext('2d');

var chart = new Chart(ctx, {
    type: 'bar',

    data: {
        labels: ['Coding','Biology','Business'],

        datasets: [{
            label: 'User Interest',
            data: {{ interest_data | tojson }}
        }]
    }

});

</script>

</body>
</html>
