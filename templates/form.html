<!DOCTYPE html>
<html>
<head>
    <title>AI Career Guidance</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h2 class="text-center mb-4">Career Guidance Form</h2>

        <form method="POST" action="/result">

            <input type="text" name="name" class="form-control mb-3" placeholder="Enter your name" required>

            <select name="interest" class="form-control mb-3" required>
                <option value="">Select Interest</option>
                <option value="coding">Coding</option>
                <option value="biology">Biology</option>
                <option value="business">Business</option>
                <option value="design">Design</option>
                <option value="teaching">Teaching</option>
            </select>


            <select name="skill" class="form-control mb-3" required>
               <option value="">Skill Level</option>
               <option value="low">Low</option>
               <option value="medium">Medium</option>
               <option value="high">High</option>
            </select>

            <select name="personality" class="form-control mb-3" required>
                <option value="">Select Personality</option>
                <option value="analytical">Analytical</option>
                <option value="caring">Caring</option>
            </select>

            <input type="number" name="marks" class="form-control mb-3" placeholder="Enter Marks (0-100)" required>

            <button type="submit" class="btn btn-success w-100">
                🚀 Get Career Suggestion
            </button>

        </form>

    </div>
</div>

</body>
</html>
