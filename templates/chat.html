<!DOCTYPE html>
<html>
<head>
    <title>Career Chatbot</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .chat-box {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .user-msg {
            text-align: right;
            color: blue;
        }

        .bot-msg {
            text-align: left;
            color: green;
        }
    </style>
</head>

<body>

<div class="chat-box">

    <h4 class="text-center mb-4">🤖 Career Chatbot</h4>

    <form method="POST">
        <input type="text" name="message" class="form-control mb-3" placeholder="Ask about your career..." required>
        <button class="btn btn-primary w-100">Send</button>
    </form>

    {% if reply %}
        <p class="bot-msg mt-3"><b>Bot:</b> {{ reply }}</p>
    {% endif %}

    <a href="/" class="btn btn-secondary mt-3 w-100">⬅ Back</a>

</div>

</body>
</html>
