<!DOCTYPE html>
<html>
<head>
    <title>User History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">
    <h2 class="text-center mb-4">📊 User History</h2>

    <table class="table table-dark table-striped">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Interest</th>
            <th>Careers</th>
            <th>Skill</th>
            <th>Personality</th>
            <th>Marks</th>

        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
            <td>{{ row[5] }}</td>
            <td>{{ row[6] }}</td>            
        </tr>
        {% endfor %}
    </table>

    <a href="/" class="btn btn-primary">Back</a>
</div>

</body>
</html>
